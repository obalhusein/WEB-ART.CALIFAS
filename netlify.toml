# netlify.toml
# Configuración de despliegue para Artesanía Los Califas
# Coloca este archivo en la raíz del repositorio

[build]
  # Directorio que Netlify desplegará (deja vacío si el index.html está en la raíz)
  publish = "."

# Redireccionamiento: si alguien va a una URL rota, a la home
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Headers de seguridad y rendimiento
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache para imágenes (cuando añadas las fotos reales)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache para fuentes y assets estáticos
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"
