<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitud recibida · Artesanía Los Califas</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F7F0E3;
      --gold: #B8922A;
      --brown: #3B2410;
      --olive: #5A6B35;
    }
    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--brown);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1rem;
      color: #5C3A1E;
      line-height: 1.7;
      font-weight: 300;
      max-width: 420px;
      margin: 0 auto 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.9rem 2rem;
      background: var(--olive);
      color: white;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #44522A; }
    .divider {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 2rem;
    }
  </style>
</head>
<body>
  <div class="icon">✉️</div>
  <div class="tag">Artesanía Los Califas</div>
  <h1>Solicitud recibida</h1>
  <div class="divider"></div>
  <p>
    Gracias por tu interés. Hemos recibido tu solicitud y
    te enviaremos el catálogo completo con tarifas mayoristas
    en menos de <strong>24 horas</strong>.
  </p>
  <a href="/" class="btn">← Volver al inicio</a>
</body>
</html>
